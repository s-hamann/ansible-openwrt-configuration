---
- name: 'Configure system'
  community.openwrt.uci:
    command: section
    config: system
    type: system
    name: '@system[0]'
    value: "{{ openwrt_config_system }}"
  notify:
    - openwrt_uci_commit
    - openwrt_restart_system
  when: "openwrt_config_system is defined"
  tags:
    - system

# Note: community.openwrt does not currently have an implementation of the cron
# module. So we use lineinfile instead.
- name: 'Reload kernel timezone on DST changes'
  community.openwrt.lineinfile:
    path: '/etc/crontabs/root'
    line: "{{ openwrt_dst_reload_time }} hwclock -u --systz"
    regexp: '^\S+\s+\S+\s+\S+\s+\S+\s+\S+\s+hwclock -u --systz$'
    create: true
    owner: root
    group: root
    mode: 0600
    state: "{{ (openwrt_dst_reload_time != false) | ansible.builtin.ternary('present', 'absent') }}"
  notify: openwrt_restart_cron
  tags:
    - system

- name: 'Configure NTP'
  community.openwrt.uci:
    command: section
    config: system
    section: timeserver
    name: ntp
    value: "{{ openwrt_config_ntp }}"
  notify:
    - openwrt_uci_commit
    - openwrt_restart_ntpd
  when: "openwrt_config_ntp is defined"
  tags:
    - ntp

- name: 'Configure uhttpd'
  community.openwrt.uci:
    command: section
    config: uhttpd
    section: uhttpd
    name: "{{ item.key }}"
    value: "{{ openwrt_config_uhttpd_section_defaults | ansible.builtin.combine(item.value) }}"
  loop: "{{ openwrt_config_uhttpd | ansible.builtin.dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  notify:
    - openwrt_uci_commit
    - openwrt_restart_uhttpd
  when: "openwrt_config_uhttpd is defined"
  tags:
    - uhttpd

- name: 'Configure uhttpd snake-oil certificate'
  community.openwrt.uci:
    command: section
    config: uhttpd
    section: cert
    name: defaults
    value: "{{ openwrt_config_uhttpd_cert }}"
  notify:
    - openwrt_uci_commit
    - openwrt_restart_uhttpd
  when: "openwrt_config_uhttpd_cert is defined"
  tags:
    - uhttpd

- name: 'Install/remove packages (opkg)'
  when: "ansible_facts['pkg_mgr'] == 'opkg'"
  block:
    - name: 'Check if package lists are recent (opkg)'
      community.openwrt.command:
        cmd: 'find /var/opkg-lists -type f -mmin -30'
      changed_when: false
      check_mode: false
      failed_when: false
      register: _opkg_lists
      when: "openwrt_config_install_packages | count > 0"
      tags:
        - packages

    # Update package lists if they do not exist or are older than 30 minutes.
    - name: 'Update package lists (opkg)'
      community.openwrt.command:
        cmd: 'opkg update'
      changed_when: true
      when: "_opkg_lists is not skipped and _opkg_lists.stdout | length == 0"
      tags:
        - packages

    - name: 'Install packages (opkg)'
      community.openwrt.opkg:
        name: "{{ item }}"
        state: present
      loop: "{{ openwrt_config_install_packages }}"
      tags:
        - packages

    - name: 'Remove packages (opkg)'
      community.openwrt.opkg:
        name: "{{ item }}"
        state: absent
      loop: "{{ openwrt_config_remove_packages }}"
      tags:
        - packages

- name: 'Install/remove packages (apk)'
  when: "ansible_facts['pkg_mgr'] == 'apk'"
  block:
    - name: 'Check if package lists are recent (apk)'
      community.openwrt.command:
        cmd: 'find /var/cache/apk/ -type f -mmin -30'
      changed_when: false
      check_mode: false
      failed_when: false
      register: _apk_index
      when: "openwrt_config_install_packages | count > 0"
      tags:
        - packages

    - name: 'Install packages (apk)'
      community.openwrt.apk:
        name: "{{ item }}"
        update_cache: "{{ _apk_index is not skipped and _apk_index.stdout | length == 0 }}"
        state: present
      loop: "{{ openwrt_config_install_packages }}"
      tags:
        - packages

    - name: 'Remove packages (apk)'
      community.openwrt.apk:
        name: "{{ item }}"
        state: absent
      loop: "{{ openwrt_config_remove_packages }}"
      tags:
        - packages

- name: 'Enable services'
  community.openwrt.service:
    name: "{{ item }}"
    enabled: true
    state: "{{ ansible_facts['is_chroot'] | ansible.builtin.ternary(omit, 'started') }}"
  loop: "{{ openwrt_config_enable_services }}"
  tags:
    - services

- name: 'Disable services'
  community.openwrt.service:
    name: "{{ item }}"
    enabled: false
    state: "{{ ansible_facts['is_chroot'] | ansible.builtin.ternary(omit, 'stopped') }}"
  loop: "{{ openwrt_config_disable_services }}"
  tags:
    - services

- name: 'Reload kernel timezone on DST changes'
  community.openwrt.lineinfile:
    path: "/etc/crontabs/{{ item['user'] | default('root') }}"
    line: "{% if item is mapping %}{{ item['time'] ~ ' ' ~ item['command'] }}{% else %}{{ item }}{% endif %}"
    create: true
    owner: "{{ item['user'] | default('root') }}"
    group: "{{ item['user'] | default('root') }}"
    mode: 0600
    state: present
  loop: "{{ openwrt_config_cronjobs }}"
  notify: openwrt_restart_cron
  tags:
    - cron
